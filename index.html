!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PlumberBot Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Google font for cursive title -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    /* --- Page & Body --- */
    body, html {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000000;
      overflow: hidden;
      padding: 10px; /* extra space so glow isn't cut off */
    }

    /* --- Chat Container --- */
    .chat-container {
      width: 50vw;
      height: 85vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: #303030;
      opacity: 0.8;
      border-radius: 20px;
      padding: 10px;

      /* Smooth 360° neon glow */
      box-shadow: 0 0 30px #318bff, 0 0 60px #08b9ff;
      animation: pulse-glow 2s infinite;
    }

    /* Title overlay */
    .chat-container::before {
      content: "Jackson's Bot";
      position: absolute;
      top: 3%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Great Vibes', cursive;
      font-size: 25px;
      color: #00c3ff;
      pointer-events: none;
      z-index: 2;
    }

    /* --- Chat Messages --- */
    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: transparent;
      z-index: 1;
    }

    .message {
      padding: 10px 15px;
      border-radius: 20px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #00c3ff;
      color: #ffffff;
      align-self: flex-end;
      border-bottom-right-radius: 0;
    }

    .bot {
      background: #707070;
      color: #ffffff;
      align-self: flex-start;
      border-bottom-left-radius: 0;
    }

    /* --- Spinner --- */
    #spinner {
      display: none;
      justify-content: center;
      align-items: center;
      margin-bottom: 10px;
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #00c3ff;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* --- Input Area --- */
    .input-container {
      display: flex;
      border-top: 1px solid #333333;
      padding: 10px;
      background: #303030;
      border-radius: 0 0 20px 20px;
      gap: 8px;
    }

    #input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 3px solid #00c3ff;
      outline: none;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: #00c3ff;
      color: #ffffff;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0a00cc;
    }

    /* --- Pulse animation for glow --- */
    @keyframes pulse-glow {
      0%   { box-shadow: 0 0 30px #02e1ff, 0 0 60px #02e1ff; }
      50%  { box-shadow: 0 0 50px #038eff, 0 0 100px #0268ee; }
      100% { box-shadow: 0 0 30px #02e1ff, 0 0 60px #02e1ff; }
    }

    /* --- Responsive Mobile --- */
    @media screen and (max-width: 600px) {
      .chat-container {
        width: 95vw;
        height: 90vh;
      }

      .chat-container::before {
        font-size: 18px;
        top: 2%;
      }

      #chat {
        padding: 10px;
      }

      .message {
        max-width: 95%;
        padding: 8px 12px;
        font-size: 14px;
      }

      .input-container {
        flex-direction: column;
        padding: 8px;
      }

      #input {
        width: 100%;
        margin-bottom: 8px;
      }

      button {
        width: 100%;
        margin-left: 0;
      }
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <div id="chat"></div>

    <!-- Spinner -->
    <div id="spinner">
      <div class="loader"></div>
    </div>

    <div class="input-container">
      <input id="input" placeholder="Ask Personal Bot..." />
      <button onclick="send()">Send</button>
    </div>
  </div>

  <script>
    async function send() {
      const input = document.getElementById("input");
      const message = input.value.trim();
      if (!message) return;

      const chat = document.getElementById("chat");

      // Show user message
      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.innerText = message;
      chat.appendChild(userMsg);
      chat.scrollTop = chat.scrollHeight;

      // Show spinner
      const spinner = document.getElementById("spinner");
      spinner.style.display = "flex";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });
        const data = await res.json();

        // Hide spinner
        spinner.style.display = "none";

        // Show bot response
        const botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerText = data.reply;
        chat.appendChild(botMsg);
        chat.scrollTop = chat.scrollHeight;

      } catch (err) {
        spinner.style.display = "none";

        const errorMsg = document.createElement("div");
        errorMsg.className = "message bot";
        errorMsg.innerText = "PlumberBot is having trouble. Try again.";
        chat.appendChild(errorMsg);
        chat.scrollTop = chat.scrollHeight;
        console.error(err);
      }

      input.value = "";
      input.focus();
    }
  </script>
</body>
</html>
