<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PlumberBot Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    /* --- Page --- */
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000000;
    }

    /* --- Neon Border Wrapper --- */
    .neon-wrapper {
      padding: 5px; /* thickness of neon border */
      border-radius: 25px;
      background: linear-gradient(45deg, #00e1ff, #003cff, #00e1ff);
      background-size: 300% 300%;
      animation: neon-move 2s linear infinite;
    }

    @keyframes neon-move {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* --- Chat Container --- */
    .chat-container {
      width: 50vw;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #303030;
      border-radius: 22px;
      padding: 15px;
      box-sizing: border-box;
    }

    /* Title */
    .chat-container::before {
      content: "Jackson's Bot";
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Great Vibes', cursive;
      font-size: 26px;
      color: #00c3ff;
    }

    /* --- Messages --- */
    #chat {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }

    .message {
      padding: 10px 15px;
      border-radius: 20px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #00c3ff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 0;
    }

    .bot {
      background: #707070;
      color: white;
      align-self: flex-start;
      border-bottom-left-radius: 0;
    }

    /* --- Spinner --- */
    #spinner {
      display: none;
      justify-content: center;
      margin: 10px 0;
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #00c3ff;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* --- Input --- */
    .input-container {
      display: flex;
      gap: 8px;
      padding-top: 10px;
    }

    #input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 2px solid #00c3ff;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: #00c3ff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #008cff;
    }

    /* --- Mobile --- */
    @media screen and (max-width: 600px) {
      .chat-container {
        width: 95vw;
        height: 85vh;
      }

      .message {
        max-width: 95%;
        font-size: 14px;
      }

      .input-container {
        flex-direction: column;
      }

      #input {
        width: 100%;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="neon-wrapper">
    <div class="chat-container">
      <div id="chat"></div>

      <div id="spinner">
        <div class="loader"></div>
      </div>

      <div class="input-container">
        <input id="input" placeholder="Ask Personal Bot..." />
        <button onclick="send()">Send</button>
      </div>
    </div>
  </div>

  <script>
    async function send() {
      const input = document.getElementById("input");
      const message = input.value.trim();
      if (!message) return;

      const chat = document.getElementById("chat");

      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.innerText = message;
      chat.appendChild(userMsg);
      chat.scrollTop = chat.scrollHeight;

      const spinner = document.getElementById("spinner");
      spinner.style.display = "flex";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await res.json();

        spinner.style.display = "none";

        const botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerText = data.reply;
        chat.appendChild(botMsg);
        chat.scrollTop = chat.scrollHeight;

      } catch (err) {
        spinner.style.display = "none";

        const errorMsg = document.createElement("div");
        errorMsg.className = "message bot";
        errorMsg.innerText = "PlumberBot is having trouble. Try again.";
        chat.appendChild(errorMsg);
      }

      input.value = "";
      input.focus();
    }
  </script>

</body>
</html>
